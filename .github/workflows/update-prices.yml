name: Update Stock Prices
 
on:
  schedule:
    # Runs at 11:15 UTC (4:45 PM IST) on weekdays — 15 min after NSE closes
    - cron: '15 11 * * 1-5'
  workflow_dispatch:   # Allows manual trigger from GitHub Actions tab

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit prices.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance psycopg2-binary

      - name: Fetch stock prices
        run: python fetch_prices.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Commit and push prices.json
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          # Pull latest first (with autostash so prices.json isn't blocked)
          git pull --rebase --autostash origin main
          git add prices.json
          # Only commit if prices.json actually changed
          git diff --staged --quiet || git commit -m "Update prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
