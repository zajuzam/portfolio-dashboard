name: Update Stock Prices

on:
  schedule:
    # Runs at 12:00 UTC (7:00 AM EST / 8:00 AM EDT) on weekdays
    - cron: '0 12 * * 1-5'
  workflow_dispatch:   # Allows manual trigger from GitHub Actions tab

concurrency:
  group: update-prices
  cancel-in-progress: true   # If two runs start, cancel the older one

jobs:
  update-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit prices.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance psycopg2-binary

      - name: Fetch stock prices
        run: python fetch_prices.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Commit and push prices.json
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          # Save the fresh prices.json our script just wrote
          cp prices.json /tmp/fresh_prices.json
          # Reset to the absolute latest remote state (avoids any diverge)
          git fetch origin main
          git reset --hard origin/main
          # Restore our fresh prices.json on top
          cp /tmp/fresh_prices.json prices.json
          git add prices.json
          # Only commit if prices.json actually changed
          git diff --staged --quiet || git commit -m "Update prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:main
